---
# roles/services/tasks/main.yml — NFS, SMB, and client-facing iSCSI configuration
# These services are INSTALLED but NOT ENABLED — Pacemaker manages start/stop.

- name: Load OS-family variables
  ansible.builtin.include_vars: "{{ ansible_os_family }}.yml"

- name: Load distribution-specific variable overrides
  ansible.builtin.include_vars: "{{ item }}"
  with_first_found:
    - files:
        - "{{ ansible_distribution }}-{{ ansible_distribution_major_version }}.yml"
        - "{{ ansible_distribution }}.yml"
      paths:
        - "{{ role_path }}/vars"
      skip: true
  when: ansible_distribution != ansible_os_family

- name: Include OS-specific package installation tasks
  ansible.builtin.include_tasks: "{{ item }}"
  with_first_found:
    - files:
        - "{{ ansible_distribution }}.yml"
        - "{{ ansible_os_family }}.yml"
      paths:
        - "{{ role_path }}/tasks"

# ─── NFS ────────────────────────────────────────────────────────────────────
- name: Disable NFS auto-start (Pacemaker manages this)
  ansible.builtin.systemd:
    name: "{{ _nfs_server_service }}"
    enabled: false

# ─── Shared cluster configuration directory ───────────────────────────────
- name: Create cluster config directory structure on shared pool
  ansible.builtin.file:
    path: "/{{ zfs_pool_name }}/cluster-config/{{ item }}"
    state: directory
    mode: "0755"
    owner: root
    group: root
  loop:
    - ""
    - "nfs"
    - "samba"
    - "samba/private"
    - "iscsi"
  when: >
    ansible_mounts | selectattr('mount', 'equalto', '/' + zfs_pool_name) | list | length > 0
  ignore_errors: true
  run_once: true
  delegate_to: "{{ pacemaker_preferred_node }}"

- name: Initialize exports on shared storage (if not exists)
  ansible.builtin.template:
    src: exports.j2
    dest: "/{{ zfs_pool_name }}/cluster-config/nfs/exports"
    mode: "0644"
    force: false
  when: >
    ansible_mounts | selectattr('mount', 'equalto', '/' + zfs_pool_name) | list | length > 0
  ignore_errors: true
  run_once: true
  delegate_to: "{{ pacemaker_preferred_node }}"

- name: Initialize smb.conf on shared storage (if not exists)
  ansible.builtin.template:
    src: smb.conf.j2
    dest: "/{{ zfs_pool_name }}/cluster-config/samba/smb.conf"
    mode: "0644"
    force: false
  when: >
    ansible_mounts | selectattr('mount', 'equalto', '/' + zfs_pool_name) | list | length > 0
  ignore_errors: true
  run_once: true
  delegate_to: "{{ pacemaker_preferred_node }}"

# ─── Symlink local config paths to shared storage ─────────────────────────
- name: Symlink /etc/exports to shared storage
  ansible.builtin.file:
    src: "/{{ zfs_pool_name }}/cluster-config/nfs/exports"
    dest: /etc/exports
    state: link
    force: true

- name: Deploy /etc/nfs.conf
  ansible.builtin.template:
    src: nfs.conf.j2
    dest: /etc/nfs.conf
    mode: "0644"

# ─── Samba / SMB ────────────────────────────────────────────────────────────
- name: Disable Samba auto-start (Pacemaker manages this)
  ansible.builtin.systemd:
    name: "{{ item }}"
    enabled: false
  loop: "{{ _samba_services }}"

- name: Symlink /etc/samba/smb.conf to shared storage
  ansible.builtin.file:
    src: "/{{ zfs_pool_name }}/cluster-config/samba/smb.conf"
    dest: /etc/samba/smb.conf
    state: link
    force: true

- name: Symlink /var/lib/samba/private to shared storage
  ansible.builtin.file:
    src: "/{{ zfs_pool_name }}/cluster-config/samba/private"
    dest: /var/lib/samba/private
    state: link
    force: true

# ─── Client-facing iSCSI target (Pacemaker-managed, optional ACLs + CHAP) ──
- name: Generate client iSCSI target setup script
  ansible.builtin.template:
    src: setup-client-iscsi-target.sh.j2
    dest: /root/setup-client-iscsi-target.sh
    mode: "0700"
  when: iscsi_client_acls is defined and iscsi_client_acls | length > 0

- name: Check if client iSCSI target already configured
  ansible.builtin.command:
    cmd: targetcli ls /iscsi/{{ iscsi_client_iqn }}
  register: client_lio_check
  failed_when: false
  changed_when: false
  when: iscsi_client_acls is defined and iscsi_client_acls | length > 0

- name: Run client LIO target setup (first time only)
  ansible.builtin.command:
    cmd: /root/setup-client-iscsi-target.sh
  when:
    - iscsi_client_acls is defined
    - iscsi_client_acls | length > 0
    - client_lio_check.rc is defined
    - client_lio_check.rc != 0

# ─── iSCSI LUN auto-sync (maps zvols to LUNs on pool import) ────────────
# Ensures zvols created by any method (Houston Cockpit, ZFS-over-iSCSI
# plugin, manual zfs create) are mapped as LUNs on both nodes after
# failover. Pacemaker runs this between zfs-pool import and vip-iscsi.
- name: Deploy iSCSI LUN sync script
  ansible.builtin.template:
    src: sync-iscsi-luns.sh.j2
    dest: /root/sync-iscsi-luns.sh
    mode: "0700"
  when: iscsi_client_acls is defined and iscsi_client_acls | length > 0

- name: Deploy iSCSI LUN sync systemd service
  ansible.builtin.template:
    src: sync-iscsi-luns.service.j2
    dest: /etc/systemd/system/sync-iscsi-luns.service
    mode: "0644"
  when: iscsi_client_acls is defined and iscsi_client_acls | length > 0
  notify: reload systemd

- name: Disable sync-iscsi-luns auto-start (Pacemaker manages this)
  ansible.builtin.systemd:
    name: sync-iscsi-luns
    enabled: false
    daemon_reload: true
  when: iscsi_client_acls is defined and iscsi_client_acls | length > 0
