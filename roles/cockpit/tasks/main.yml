---
# roles/cockpit/tasks/main.yml — Cockpit + 45Drives Houston plugins

- name: Load OS-specific variables
  ansible.builtin.include_vars: "{{ ansible_os_family }}.yml"

- name: Include OS-specific Cockpit installation tasks
  ansible.builtin.include_tasks: "{{ ansible_os_family }}.yml"

# ─── Shared Cockpit configuration (OS-independent) ──────────────────────────

# Pacemaker manages the Cockpit socket on storage nodes (VIP follows the active node).
- name: Disable Cockpit auto-start on storage nodes (Pacemaker manages this)
  ansible.builtin.systemd:
    name: cockpit.socket
    enabled: false
    state: stopped

# ─── Custom TLS certificate for Cockpit (optional) ────────────────────────
- name: Create Cockpit TLS cert directory
  ansible.builtin.file:
    path: /etc/cockpit/ws-certs.d
    state: directory
    mode: "0700"
  when: cockpit_tls_cert_file is defined and cockpit_tls_key_file is defined

- name: Deploy custom Cockpit TLS certificate
  ansible.builtin.copy:
    src: "{{ cockpit_tls_cert_file }}"
    dest: /etc/cockpit/ws-certs.d/10-custom.crt
    mode: "0644"
  when: cockpit_tls_cert_file is defined
  notify: restart cockpit

- name: Deploy custom Cockpit TLS key
  ansible.builtin.copy:
    src: "{{ cockpit_tls_key_file }}"
    dest: /etc/cockpit/ws-certs.d/10-custom.key
    mode: "0600"
  when: cockpit_tls_key_file is defined
  notify: restart cockpit
