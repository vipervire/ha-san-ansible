---
- name: restart node_exporter
  ansible.builtin.systemd:
    name: prometheus-node-exporter
    state: restarted

- name: reload systemd
  ansible.builtin.systemd:
    daemon_reload: true

- name: restart ha_cluster_exporter
  ansible.builtin.systemd:
    name: prometheus-hacluster-exporter
    state: restarted
