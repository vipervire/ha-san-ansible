---
# roles/zfs/tasks/install_sanoid_Ubuntu.yml — Ubuntu-specific Sanoid installation
# Ubuntu 24.04+ has sanoid in universe. Ubuntu 22.04 does not; install deps only.

- name: Install sanoid dependencies
  ansible.builtin.apt:
    name: "{{ _sanoid_packages }}"
    state: present

- name: Install sanoid from apt (Ubuntu 24.04+)
  ansible.builtin.apt:
    name: sanoid
    state: present
  when: ansible_distribution_major_version | int >= 24
  ignore_errors: true  # In case package name differs in a point release

- name: Inform about manual sanoid install on Ubuntu 22.04
  ansible.builtin.debug:
    msg: >
      Ubuntu 22.04 does not ship sanoid in its repositories.
      Dependencies have been installed. To install sanoid manually:
        git clone https://github.com/jimsalterjrs/sanoid.git /opt/sanoid
        ln -s /opt/sanoid/sanoid /usr/sbin/sanoid
        ln -s /opt/sanoid/syncoid /usr/sbin/syncoid
      Then create /etc/sanoid/ and re-run the playbook to deploy the configuration.
  when: ansible_distribution_major_version | int < 24
