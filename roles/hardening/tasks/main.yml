---
# roles/hardening/tasks/main.yml — Security hardening for all nodes

# ─── SSH Hardening ──────────────────────────────────────────────────────────
- name: Deploy SSH hardening config
  ansible.builtin.template:
    src: sshd_hardening.conf.j2
    dest: /etc/ssh/sshd_config.d/90-hardening.conf
    mode: "0644"
    validate: "sshd -t -f %s"
  notify: restart sshd

# ─── Kernel Sysctl Hardening ───────────────────────────────────────────────
- name: Deploy security sysctl settings
  ansible.builtin.template:
    src: 90-hardening.conf.j2
    dest: /etc/sysctl.d/90-hardening.conf
    mode: "0644"
  notify: reload sysctl

# ─── TCP performance tuning (storage nodes only) ──────────────────────────
- name: Deploy TCP tuning for 40GbE
  ansible.builtin.copy:
    dest: /etc/sysctl.d/91-tcp-tuning.conf
    mode: "0644"
    content: |
      # Managed by Ansible — 40GbE iSCSI TCP tuning
      {% for key, value in tcp_tunables.items() %}
      {{ key }} = {{ value }}
      {% endfor %}
  when: tcp_tunables is defined
  notify: reload sysctl

# ─── nftables Firewall ────────────────────────────────────────────────────
- name: Install nftables
  ansible.builtin.apt:
    name: nftables
    state: present

- name: Deploy nftables ruleset
  ansible.builtin.template:
    src: nftables.conf.j2
    dest: /etc/nftables.conf
    mode: "0755"
  notify: restart nftables

- name: Enable nftables service
  ansible.builtin.systemd:
    name: nftables
    enabled: true
    state: started

# ─── PAM Account Lockout ──────────────────────────────────────────────────
- name: Deploy PAM faillock configuration
  ansible.builtin.template:
    src: faillock.conf.j2
    dest: /etc/security/faillock.conf
    mode: "0644"

- name: Enable PAM faillock module
  ansible.builtin.command: pam-auth-update --enable faillock
  changed_when: false
  # pam-auth-update is idempotent — safe to re-run

# ─── Disable unnecessary services ─────────────────────────────────────────
- name: Disable IPv6 if not needed
  ansible.builtin.sysctl:
    name: "{{ item }}"
    value: "1"
    sysctl_set: true
    reload: true
  loop:
    - net.ipv6.conf.all.disable_ipv6
    - net.ipv6.conf.default.disable_ipv6

# ─── TCP BBR congestion control module ────────────────────────────────────
- name: Load tcp_bbr kernel module
  community.general.modprobe:
    name: tcp_bbr
    state: present
    persistent: present
  when: >
    tcp_tunables is defined and
    tcp_tunables.get('net.ipv4.tcp_congestion_control', '') == 'bbr'

# ─── auditd ───────────────────────────────────────────────────────────────
- name: Install auditd
  ansible.builtin.apt:
    name: auditd
    state: present
  when: auditd_enabled | default(false)

- name: Deploy audit rules
  ansible.builtin.template:
    src: audit.rules.j2
    dest: /etc/audit/rules.d/99-ha-san.rules
    mode: "0640"
  when: auditd_enabled | default(false)
  notify: restart auditd

- name: Enable auditd service
  ansible.builtin.systemd:
    name: auditd
    enabled: true
    state: started
  when: auditd_enabled | default(false)

# ─── syslog forwarding ────────────────────────────────────────────────────
- name: Install rsyslog
  ansible.builtin.apt:
    name: rsyslog
    state: present
  when: syslog_remote_enabled | default(false)

- name: Deploy rsyslog remote forwarding config
  ansible.builtin.template:
    src: rsyslog-forward.conf.j2
    dest: /etc/rsyslog.d/90-remote.conf
    mode: "0644"
  when: syslog_remote_enabled | default(false)
  notify: restart rsyslog

# ─── hardware watchdog ────────────────────────────────────────────────────
- name: Install watchdog
  ansible.builtin.apt:
    name: watchdog
    state: present
  when: watchdog_enabled | default(false)

- name: Deploy watchdog configuration
  ansible.builtin.template:
    src: watchdog.conf.j2
    dest: /etc/watchdog.conf
    mode: "0644"
  when: watchdog_enabled | default(false)
  notify: restart watchdog

- name: Enable watchdog service
  ansible.builtin.systemd:
    name: watchdog
    enabled: true
    state: started
  when: watchdog_enabled | default(false)
