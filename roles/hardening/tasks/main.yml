---
# roles/hardening/tasks/main.yml — Security hardening for all nodes

# ─── SSH Hardening ──────────────────────────────────────────────────────────
- name: Deploy SSH hardening config
  ansible.builtin.template:
    src: sshd_hardening.conf.j2
    dest: /etc/ssh/sshd_config.d/90-hardening.conf
    mode: "0644"
    validate: "sshd -t -f %s"
  notify: restart sshd

# ─── Kernel Sysctl Hardening ───────────────────────────────────────────────
- name: Deploy security sysctl settings
  ansible.builtin.template:
    src: 90-hardening.conf.j2
    dest: /etc/sysctl.d/90-hardening.conf
    mode: "0644"
  notify: reload sysctl

# ─── TCP performance tuning (storage nodes only) ──────────────────────────
- name: Deploy TCP tuning for 40GbE
  ansible.builtin.copy:
    dest: /etc/sysctl.d/91-tcp-tuning.conf
    mode: "0644"
    content: |
      # Managed by Ansible — 40GbE iSCSI TCP tuning
      {% for key, value in tcp_tunables.items() %}
      {{ key }} = {{ value }}
      {% endfor %}
  when: tcp_tunables is defined
  notify: reload sysctl

# ─── nftables Firewall ────────────────────────────────────────────────────
- name: Install nftables
  ansible.builtin.apt:
    name: nftables
    state: present

- name: Deploy nftables ruleset
  ansible.builtin.template:
    src: nftables.conf.j2
    dest: /etc/nftables.conf
    mode: "0755"
  notify: restart nftables

- name: Enable nftables service
  ansible.builtin.systemd:
    name: nftables
    enabled: true
    state: started

# ─── PAM Account Lockout ──────────────────────────────────────────────────
- name: Deploy PAM faillock configuration
  ansible.builtin.template:
    src: faillock.conf.j2
    dest: /etc/security/faillock.conf
    mode: "0644"

- name: Enable PAM faillock module
  ansible.builtin.command: pam-auth-update --enable faillock
  changed_when: false
  # pam-auth-update is idempotent — safe to re-run

# ─── Disable unnecessary services ─────────────────────────────────────────
- name: Disable IPv6 if not needed
  ansible.builtin.sysctl:
    name: "{{ item }}"
    value: "1"
    sysctl_set: true
    reload: true
  loop:
    - net.ipv6.conf.all.disable_ipv6
    - net.ipv6.conf.default.disable_ipv6
