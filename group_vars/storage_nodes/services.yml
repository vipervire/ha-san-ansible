---
# =============================================================================
# Storage Node Variables — NFS and SMB service configuration
# =============================================================================

# ---------------------------------------------------------------------------
# NFS
# ---------------------------------------------------------------------------
nfs_exports:
  - path: "/{{ zfs_pool_name }}/nfs"
    clients: "10.30.30.0/24"
    options: "rw,sync,no_subtree_check,root_squash,sec=sys"
  - path: "/{{ zfs_pool_name }}/k3s-pv"
    clients: "10.30.30.0/24"
    options: "rw,sync,no_subtree_check,root_squash,sec=sys"

nfs_bind_ip: "{{ vip_nfs }}"

# ---------------------------------------------------------------------------
# Samba / SMB
# ---------------------------------------------------------------------------
smb_bind_ip: "{{ vip_smb }}"
smb_workgroup: "HOMELAB"
smb_server_string: "HA SAN SMB"
smb_encrypt: "required"   # "desired" if some clients can't do SMB3 encryption
smb_shares:
  - name: shared
    path: "/{{ zfs_pool_name }}/smb"
    read_only: false
    valid_users: "@smbusers"
    shadow_copy: true
