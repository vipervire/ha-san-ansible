---
# =============================================================================
# Storage Node Variables (Node A + Node B)
# =============================================================================

# ---------------------------------------------------------------------------
# Network interfaces — adjust to match your hardware
# ---------------------------------------------------------------------------
# These are the physical or bond interface names BEFORE VLAN subinterfaces.
# The playbook creates VLAN subinterfaces on top of these.
net_storage_parent: "ens3f0"      # 40GbE Mellanox — for iSCSI replication
net_client_parent: "ens3f1"       # for NFS/SMB/iSCSI client traffic
net_mgmt_interface: "eno1"        # 1GbE onboard — management + Corosync ring0

# ---------------------------------------------------------------------------
# ZFS
# ---------------------------------------------------------------------------
zfs_pool_name: "san-pool"
zfs_pool_ashift: 12
zfs_pool_options:
  multihost: "on"
  autotrim: "on"
zfs_dataset_options:
  acltype: posixacl
  compression: lz4
  dnodesize: auto
  xattr: sa
  atime: "off"

# ARC limit — dynamically calculated at deploy time as 50% of total RAM.
# Override per-host in host_vars/<node>.yml if a specific value is needed:
#   zfs_arc_max: 17179869184  # 16GB — explicit per-host override
# The _zfs_arc_max fact is computed in roles/zfs/tasks/main.yml at runtime.

# ZFS module tunables written to /etc/modprobe.d/zfs.conf
# NOTE: zfs_arc_max is not listed here — it is injected dynamically by the zfs role
zfs_modprobe_options:
  zfs_vdev_scheduler: "none"
  zfs_txg_timeout: 30           # Default: reduces write latency stalls; sync writes unaffected
  zfs_resilver_min_time_ms: 27000   # 27s minimum ensures steady drive recovery (OpenZFS recommended)
  zfs_resilver_delay: 0

# ZFS scrub automation
zfs_scrub_enabled: true
zfs_scrub_schedule: "*-*-01 02:00:00"  # 1st of month at 2:00 AM
zfs_scrub_randomized_delay_sec: 1800   # 30 minutes random delay
zfs_scrub_skip_on_degraded: true       # Skip if pool is degraded
zfs_scrub_min_interval_days: 25        # Minimum days between scrubs

# ZFS scrub monitoring (Prometheus metrics)
zfs_scrub_monitoring_enabled: true     # Export scrub metrics for Prometheus

# Datasets to create after pool exists
zfs_datasets:
  - name: "{{ zfs_pool_name }}/nfs"
    properties:
      sharenfs: "off"  # managed by /etc/exports, not ZFS
      recordsize: "128k"
  - name: "{{ zfs_pool_name }}/smb"
    properties:
      sharesmb: "off"  # managed by smb.conf
      recordsize: "128k"
      snapdir: visible
  - name: "{{ zfs_pool_name }}/iscsi"
    properties:
      primarycache: metadata
  - name: "{{ zfs_pool_name }}/k3s-pv"
    properties:
      recordsize: "128k"

# ---------------------------------------------------------------------------
# iSCSI — Backend replication layer
# ---------------------------------------------------------------------------
iscsi_iqn_prefix: "iqn.2025-01.lab.home"

# CHAP authentication for backend replication
iscsi_chap_enabled: true
iscsi_chap_user: "iscsi-repl-user"
iscsi_chap_password: "CHANGEME-vault-this"  # ansible-vault in production

# Mutual CHAP: initiator verifies the target knows this credential (bidirectional auth)
# When enabled, the target presents these credentials back to the initiator.
# Both nodes share the same mutual CHAP credential (symmetric design).
iscsi_mutual_chap_enabled: true
iscsi_mutual_chap_user: "iscsi-target-user"
iscsi_mutual_chap_password: "CHANGEME-vault-this"  # ansible-vault in production — MUST differ from iscsi_chap_password

# open-iscsi initiator aggressive-safe timeouts
iscsi_replacement_timeout: 5
iscsi_noop_out_interval: 2
iscsi_noop_out_timeout: 2
iscsi_login_timeout: 10       # Reduced: replacement_timeout (5s) handles path failures; this covers initial login

# ---------------------------------------------------------------------------
# iSCSI — Client-facing target (Pacemaker-managed)
# ---------------------------------------------------------------------------
iscsi_client_iqn: "{{ iscsi_iqn_prefix }}:san-client-target"

# Proxmox initiator IQNs allowed to connect to client-facing target
iscsi_client_acls:
  - "{{ iscsi_iqn_prefix }}:proxmox-a"
  - "{{ iscsi_iqn_prefix }}:proxmox-b"

# ---------------------------------------------------------------------------
# NFS
# ---------------------------------------------------------------------------
nfs_exports:
  - path: "/{{ zfs_pool_name }}/nfs"
    clients: "10.30.30.0/24"
    options: "rw,sync,no_subtree_check,root_squash,sec=sys"
  - path: "/{{ zfs_pool_name }}/k3s-pv"
    clients: "10.30.30.0/24"
    options: "rw,sync,no_subtree_check,root_squash,sec=sys"

nfs_bind_ip: "{{ vip_nfs }}"
nfs_threads: 8
nfs_v3_enabled: false
nfs_v4_enabled: true
nfs_v41_enabled: true

# ---------------------------------------------------------------------------
# Samba / SMB
# ---------------------------------------------------------------------------
smb_bind_ip: "{{ vip_smb }}"
smb_workgroup: "HOMELAB"
smb_server_string: "HA SAN SMB"
smb_min_protocol: "SMB3"
smb_signing: "required"
smb_encrypt: "required"   # "desired" if some clients can't do SMB3 encryption
smb_shares:
  - name: shared
    path: "/{{ zfs_pool_name }}/smb"
    read_only: false
    valid_users: "@smbusers"
    shadow_copy: true

# ---------------------------------------------------------------------------
# STONITH fencing
# ---------------------------------------------------------------------------
# Per-node STONITH configuration supporting mixed fencing methods

stonith_nodes:
  storage-a:
    method: "ipmi"           # Options: ipmi, kasa, tasmota, esphome, http
    ip: "10.20.20.101"       # BMC IP or smart plug IP
    user: "bmcadmin"         # IPMI user
    password: "CHANGEME-vault-this"  # IPMI password (vault this!)

  storage-b:
    method: "kasa"           # TP-Link Kasa smart plug
    ip: "10.20.20.202"       # Smart plug IP on management VLAN
    # No credentials needed for Kasa local protocol

# ───────────────────────────────────────────────────────────────────────────
# Example configurations for other methods:
# ───────────────────────────────────────────────────────────────────────────

# Example: Both nodes using IPMI
# stonith_nodes:
#   storage-a:
#     method: "ipmi"
#     ip: "10.20.20.101"
#     user: "admin"
#     password: "secret"
#   storage-b:
#     method: "ipmi"
#     ip: "10.20.20.102"
#     user: "admin"
#     password: "secret"

# Example: Both nodes using smart plugs
# stonith_nodes:
#   storage-a:
#     method: "kasa"
#     ip: "10.20.20.201"
#   storage-b:
#     method: "esphome"
#     ip: "10.20.20.202"
#     switch_name: "relay"
#     user: "admin"
#     password: "plugsecret"

# Example: Tasmota smart plug
# stonith_nodes:
#   storage-a:
#     method: "tasmota"
#     ip: "10.20.20.201"
#     user: "admin"          # optional
#     password: "secret"     # optional

# Example: Generic HTTP-controlled device
# stonith_nodes:
#   storage-a:
#     method: "http"
#     ip: "10.20.20.201"
#     user: "admin"
#     password: "secret"
#     power_off_url: "/api/power/off"
#     power_on_url: "/api/power/on"
#     status_url: "/api/status"
#     status_on_regex: "powered.*on"
#     status_off_regex: "powered.*off"

# ---------------------------------------------------------------------------
# Pacemaker resource configuration
# ---------------------------------------------------------------------------
pacemaker_resource_stickiness: 200
pacemaker_preferred_node: "storage-a"  # soft preference, not hard pin

# Seconds to wait after 'pcs node standby' during shutdown for resources to migrate
# before pacemaker itself stops. Planned migration takes ~5-8s; 15s is conservative.
pacemaker_standby_drain_seconds: 15

# ---------------------------------------------------------------------------
# Sanoid snapshot policy
# ---------------------------------------------------------------------------
sanoid_install: true
sanoid_datasets:
  - name: "{{ zfs_pool_name }}/nfs"
    template: production
    recursive: true
  - name: "{{ zfs_pool_name }}/smb"
    template: production
    recursive: true
  - name: "{{ zfs_pool_name }}/iscsi"
    template: vm_storage
    recursive: true

sanoid_templates:
  production:
    hourly: 24
    daily: 30
    monthly: 6
    yearly: 0
    autosnap: true
    autoprune: true
  vm_storage:
    hourly: 12
    daily: 14
    monthly: 3
    yearly: 0
    autosnap: true
    autoprune: true

# ---------------------------------------------------------------------------
# TCP / Network tuning for 40GbE iSCSI
# ---------------------------------------------------------------------------
tcp_tunables:
  net.core.rmem_max: 16777216
  net.core.wmem_max: 16777216
  net.ipv4.tcp_rmem: "4096 87380 16777216"
  net.ipv4.tcp_wmem: "4096 65536 16777216"
